<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotscope</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

.page {
  width: 100%;
  background: #000;
}

/* TOP BANNER */
.banner {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 10px 0;
  background: #000;
}

/* VIDEO */
.video-box {
  width: 100%;
  display: flex;
  justify-content: center;
  background: #000;
  margin-bottom: 12px;
}

video {
  width: 100%;
  max-height: 78vh;
  object-fit: contain;
  background: #000;
}

/* CTA SECTION */
.cta-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 10px 16px 18px;
  background: #000;
}

.cta-btn {
  width: 100%;
  max-width: 380px;
  padding: 16px 0;
  text-align: center;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: #fff;
  font-size: 17px;
  font-weight: 600;
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
  user-select: none;
  box-shadow: 0 6px 18px rgba(37,99,235,0.4);
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
}

.cta-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(37,99,235,0.5);
}

.cta-btn:active {
  transform: scale(0.98);
}

/* 300x250 BANNER */
.banner-300 {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 20px 0 30px;
  background: #000;
}
</style>
</head>

<body>

<div class="page">

  <!-- TOP 320x50 -->
  <div class="banner">
    <script>
      atOptions = {
        'key' : 'd80bfd757b025a872ace2ea44d5b9c0d',
        'format' : 'iframe',
        'height' : 50,
        'width' : 320,
        'params' : {}
      };
    </script>
    <script src="https://possessedannihilation.com/d80bfd757b025a872ace2ea44d5b9c0d/invoke.js"></script>
  </div>

  <!-- VIDEO -->
  <div class="video-box">
    <video id="player"
      controls
      muted
      playsinline
      preload="metadata">
      <source id="videoSource" src="" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- PREMIUM CTA -->

        'format' : 'iframe',

    <script src="https://possessedannihilation.com/ea37ba6a8e80dc3662337e112d36d67b/invoke.js"></script>
  </div>

</div>

<!-- LOAD VIDEO FROM ?v= -->
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  let video = params.get("v");

  if (video) {
    if (!video.startsWith("http")) {
      video = "https://cdn.videy.co/" + video;
    }
  } else {
    video = "https://cdn.videy.co/QCY4wUNX1.mp4";
  }

  const player = document.getElementById("player");
  document.getElementById("videoSource").src = video;
  player.load();
})();
</script>

<!-- DIRECTLINK 1 CLICK SAFE -->
<script>
(function () {
  const url = "https://possessedannihilation.com/yym1xdpt?key=92054b506280440e64f94cf931dcd23b";
  let clicked = false;

  document.getElementById("directBtn").addEventListener("click", function () {
    if (clicked) return;
    clicked = true;
    window.open(url, "_blank");
  });
})();
</script>

<!-- LIGHT PROTECTION -->
<script>
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());
</script>

</body>
</html>
