<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotscope</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  overflow-x: hidden;
}

.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #000;
}

/* TOP BANNER */
.banner {
  display: flex;
  justify-content: center;
  padding: 10px 0;
}

/* VIDEO */
.video-box {
  width: 100%;
}

video {
  width: 100%;
  max-height: 75vh;
  object-fit: contain;
  display: block;
}

/* 300 BANNER */
.banner-300 {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px 0 30px;
  width: 100%;
}

.banner-300 iframe {
  max-width: 100%;
}
</style>
</head>

<body>

<div class="page">

  <!-- TOP 320x50 -->
  <div class="banner">
    <script>
      atOptions = {
        'key' : 'd80bfd757b025a872ace2ea44d5b9c0d',
        'format' : 'iframe',
        'height' : 50,
        'width' : 320,
        'params' : {}
      };
    </script>
    <script src="https://possessedannihilation.com/d80bfd757b025a872ace2ea44d5b9c0d/invoke.js"></script>
  </div>

  <!-- VIDEO -->
  <div class="video-box">
    <video id="player" controls muted playsinline preload="metadata">
      <source id="videoSource" src="" type="video/mp4">
    </video>
  </div>

  <!-- 300x250 BANNER -->
  <div class="banner-300">
    <script>
      atOptions = {
        'key' : 'ea37ba6a8e80dc3662337e112d36d67b',
        'format' : 'iframe',
        'height' : 250,
        'width' : 300,
        'params' : {}
      };
    </script>
    <script src="https://possessedannihilation.com/ea37ba6a8e80dc3662337e112d36d67b/invoke.js"></script>
  </div>

</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  let video = params.get("v");

  if (video) {
    if (!video.startsWith("http")) {
      video = "https://cdn.videy.co/" + video;
    }
  } else {
    video = "https://cdn.videy.co/QCY4wUNX1.mp4";
  }

  document.getElementById("videoSource").src = video;
  document.getElementById("player").load();
})();
</script>

</body>
</html>
